name: Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup environment
        run: sudo apt-get install -y g++ cmake

      - name: Test
        run: ./test.sh
